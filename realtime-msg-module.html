<!-- 实时消息推送 v2.0 -->
<section class="section-card" id="realtime-msg-section">
  <div class="section-header">
    <h2>💬 实时消息</h2>
    <span id="msg-status" style="font-size: 12px; color: var(--success-color);">🟢 在线</span>
    <button class="refresh-btn" onclick="loadMessages()">🔄</button>
  </div>

  <div class="msg-chat-area" style="display: flex; flex-direction: column; height: 400px; background: var(--card-bg); border-radius: var(--border-radius); overflow: hidden;">
    <!-- 消息显示区 -->
    <div id="msg-list" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;">
      <div style="text-align: center; color: var(--text-light); font-size: 12px; padding: 20px;">
        暂无消息，发送第一条消息吧～
      </div>
    </div>

    <!-- 输入区 -->
    <div style="padding: 15px; background: var(--bg-color); border-top: 1px solid var(--border-color); display: flex; gap: 10px;">
      <input type="text" id="msg-input" placeholder="输入消息..." style="flex: 1; padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 20px; outline: none;" onkeypress="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" style="padding: 10px 20px; background: var(--primary-color); color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 18px;">
        ➤
      </button>
    </div>
  </div>
</section>

<style>
.msg-bubble {
  max-width: 70%;
  padding: 10px 15px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.4;
  animation: msgFadeIn 0.3s ease;
}

@keyframes msgFadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.msg-bubble.sent {
  align-self: flex-end;
  background: var(--primary-color);
  color: white;
  border-bottom-right-radius: 5px;
}

.msg-bubble.received {
  align-self: flex-start;
  background: var(--card-bg);
  color: var(--text-color);
  border: 1px solid var(--border-color);
  border-bottom-left-radius: 5px;
}

.msg-time {
  font-size: 10px;
  opacity: 0.7;
  margin-top: 5px;
  text-align: right;
}

.msg-sender {
  font-size: 11px;
  font-weight: bold;
  margin-bottom: 3px;
  color: var(--primary-dark);
}
</style>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'love_realtime_messages';
  const POLL_INTERVAL = 3000; // 3秒轮询一次

  // 获取消息
  function getMessages() {
    var data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  }

  // 保存消息
  function saveMessages(messages) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    // 触发storage事件，实现跨标签页实时同步
    window.dispatchEvent(new StorageEvent('storage', {
      key: STORAGE_KEY,
      newValue: JSON.stringify(messages)
    }));
  }

  // 发送消息
  window.sendMessage = function() {
    var input = document.getElementById('msg-input');
    var text = input.value.trim();

    if (!text) return;

    var messages = getMessages();
    messages.push({
      id: Date.now(),
      text: text,
      sender: '我',
      senderIcon: '🐹',
      time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
      timestamp: Date.now()
    });

    saveMessages(messages);
    input.value = '';
    renderMessages();

    // 模拟对方回复（演示用）
    setTimeout(function() {
      var replies = [
        '收到啦～💕',
        '哈哈哈哈',
        '好哒！',
        '爱你～',
        '马上来看！',
        '太棒了！🎉'
      ];
      var randomReply = replies[Math.floor(Math.random() * replies.length)];

      var messages = getMessages();
      messages.push({
        id: Date.now(),
        text: randomReply,
        sender: '对方',
        senderIcon: '🐱',
        time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
        timestamp: Date.now()
      });
      saveMessages(messages);
      renderMessages();
    }, 1000 + Math.random() * 2000);
  };

  // 渲染消息
  function renderMessages() {
    var messages = getMessages();
    var container = document.getElementById('msg-list');

    if (!container) return;

    if (messages.length === 0) {
      container.innerHTML = '<div style="text-align: center; color: var(--text-light); font-size: 12px; padding: 20px;">暂无消息，发送第一条消息吧～</div>';
      return;
    }

    container.innerHTML = messages.map(function(msg) {
      var isSent = msg.sender === '我';
      return `
        <div class="msg-bubble ${isSent ? 'sent' : 'received'}">
          ${!isSent ? '<div class="msg-sender">' + msg.senderIcon + ' ' + msg.sender + '</div>' : ''}
          <div>${msg.text}</div>
          <div class="msg-time">${msg.time}</div>
        </div>
      `;
    }).join('');

    // 滚动到底部
    container.scrollTop = container.scrollHeight;
  }

  // 加载消息（公开函数）
  window.loadMessages = function() {
    renderMessages();
  };

  // 实时轮询新消息
  function startPolling() {
    setInterval(function() {
      renderMessages();
      // 更新在线状态
      var statusEl = document.getElementById('msg-status');
      if (statusEl) {
        statusEl.innerHTML = '🟢 在线';
        statusEl.style.color = 'var(--success-color)';
      }
    }, POLL_INTERVAL);
  }

  // 监听storage事件（跨标签页同步）
  window.addEventListener('storage', function(e) {
    if (e.key === STORAGE_KEY) {
      renderMessages();
    }
  });

  // 初始化
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      renderMessages();
      startPolling();
    });
  } else {
    setTimeout(function() {
      renderMessages();
      startPolling();
    }, 500);
  }

  console.log('[RealtimeMsg] ✅ 实时消息推送已加载');

})();
</script>
