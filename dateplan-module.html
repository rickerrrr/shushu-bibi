<!-- 约会企划库模块 v2.0 -->
<section id="dateplan-section" class="main-section hidden">
  <div class="section-header">
    <span class="section-icon">📅</span>
    <h2>约会企划库</h2>
    <button style="float:right;background:transparent;border:none;font-size:20px;cursor:pointer;" onclick="location.reload()">🔄</button>
  </div>

  <div class="dateplan-container" style="padding:20px;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
      <button onclick="showAddDatePlanModal('todo')" style="padding:14px;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;">
        📋 待打卡清单
      </button>
      <button onclick="showAddDatePlanModal('done')" style="padding:14px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;border:none;border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;">
        ✅ 已完成存档
      </button>
    </div>

    <div id="dateplan-list"></div>
  </div>
</section>

<script>
(function() {
  var DATEPLANS_KEY = 'couple_dateplans';

  function getDatePlans() {
    return JSON.parse(localStorage.getItem(DATEPLANS_KEY) || '[]');
  }

  function saveDatePlans(plans) {
    localStorage.setItem(DATEPLANS_KEY, JSON.stringify(plans));
  }

  var currentFilter = 'todo';

  window.showAddDatePlanModal = function(type) {
    currentFilter = type || 'todo';
    var html =
      '<div style="padding:20px;">' +
      '<h3 style="margin-bottom:15px;">📅 添加约会计划</h3>' +
      '<input type="text" id="plan-title" placeholder="计划名称（如：看电影）" style="width:100%;padding:12px;border-radius:12px;border:2px solid #6ee7b7;margin-bottom:10px;box-sizing:border-box;">' +
      '<textarea id="plan-desc" placeholder="详细描述..." style="width:100%;height:80px;padding:12px;border-radius:12px;border:2px solid #6ee7b7;margin-bottom:10px;box-sizing:border-box;resize:vertical;"></textarea>' +
      '<input type="text" id="plan-budget" placeholder="预算（元）" style="width:100%;padding:12px;border-radius:12px;border:2px solid #6ee7b7;margin-bottom:10px;box-sizing:border-box;">' +
      '<select id="plan-category" style="width:100%;padding:12px;border-radius:12px;border:2px solid #6ee7b7;margin-bottom:15px;box-sizing:border-box;">' +
      '  <option value="food">🍕 美食</option>' +
      '  <option value="movie">🎬 电影</option>' +
      '  <option value="travel">✈️ 旅行</option>' +
      '  <option value="shopping">🛍️ 购物</option>' +
      '  <option value="other">📦 其他</option>' +
      '</select>' +
      '<button onclick="window.saveDatePlan()" style="width:100%;padding:12px;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:12px;font-size:16px;cursor:pointer;">✅ 保存</button>' +
      '</div>';

    if (typeof showGlobalModal === 'function') showGlobalModal(html);
  };

  window.saveDatePlan = function() {
    var title = document.getElementById('plan-title').value.trim();
    var desc = document.getElementById('plan-desc').value.trim();
    var budget = document.getElementById('plan-budget').value;
    var category = document.getElementById('plan-category').value;

    if (!title) { alert('请输入计划名称！'); return; }

    var plans = getDatePlans();
    plans.push({
      id: 'plan_' + Date.now(),
      title: title,
      desc: desc,
      budget: budget ? parseFloat(budget) : 0,
      category: category,
      completed: false,
      createdAt: new Date().toLocaleString('zh-CN')
    });

    saveDatePlans(plans);
    if (typeof closeGlobalModal === 'function') closeGlobalModal();
    alert('✅ 约会计划已添加！');
    renderDatePlans();
  };

  window.renderDatePlans = function() {
    var plans = getDatePlans();
    var list = document.getElementById('dateplan-list');
    if (!list) return;

    var filtered = plans.filter(function(p) { return currentFilter === 'all' || (currentFilter === 'todo' && !p.completed) || (currentFilter === 'done' && p.completed); });

    if (filtered.length === 0) {
      list.innerHTML = '<p style="text-align:center;color:#9ca3af;padding:40px;">' + (currentFilter === 'todo' ? '暂无待打卡计划' : '暂无已完成计划') + '</p>';
      return;
    }

    var html = '';
    filtered.forEach(function(p, i) {
      var catIcons = { food: '🍕', movie: '🎬', travel: '✈️', shopping: '🛍️', other: '📦' };
      html +=
        '<div style="background:' + (p.completed ? 'linear-gradient(135deg,#d1fae5,#a7f3d0)' : 'white') + ';border-radius:16px;padding:16px;margin-bottom:12px;border-left:4px solid ' + (p.completed ? '#10b981' : '#10b981') + ';box-shadow:0 2px 8px rgba(0,0,0,0.1);">' +
        '  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
        '    <span style="font-size:20px;">' + (catIcons[p.category] || '📦') + '</span>' +
        '    <span style="font-size:11px;color:#999;">' + p.createdAt + '</span>' +
        '  </div>' +
        '  <div style="font-size:16px;font-weight:600;color:#444;margin-bottom:6px;">' + p.title + '</div>' +
        (p.desc ? '  <div style="font-size:13px;color:#666;margin-bottom:6px;">' + p.desc + '</div>' : '') +
        (p.budget ? '  <div style="font-size:12px;color:#10b981;margin-bottom:8px;">💰 预算: ¥' + p.budget + '</div>' : '') +
        '  <div style="display:flex;gap:8px;">' +
        '    <button onclick="window.toggleDatePlan(' + plans.indexOf(p) + ')" style="flex:1;padding:8px;border:none;border-radius:8px;background:' + (p.completed ? '#e5e7eb' : '#10b981') + ';color:' + (p.completed ? '#666' : 'white') + ';cursor:pointer;font-size:13px;">' + (p.completed ? '↩️ 重置' : '✅ 完成') + '</button>' +
        '    <button onclick="window.deleteDatePlan(' + plans.indexOf(p) + ')" style="padding:8px 12px;border:none;border-radius:8px;background:#fee2e2;color:#ef4444;cursor:pointer;font-size:13px;">🗑️</button>' +
        '  </div>' +
        '</div>';
    });

    list.innerHTML = html;
  };

  window.toggleDatePlan = function(idx) {
    var plans = getDatePlans();
    plans[idx].completed = !plans[idx].completed;
    if (plans[idx].completed) {
      plans[idx].completedAt = new Date().toLocaleString('zh-CN');
    }
    saveDatePlans(plans);
    renderDatePlans();
  };

  window.deleteDatePlan = function(idx) {
    if (!confirm('确定删除这个计划？')) return;
    var plans = getDatePlans();
    plans.splice(idx, 1);
    saveDatePlans(plans);
    renderDatePlans();
  };

  console.log('[DatePlan] ✅ 约会企划库功能已加载');
  renderDatePlans();

})();
</script>
